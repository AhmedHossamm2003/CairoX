<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Netlify Form Detection</title>
  </head>
  <body>
    <!--
      This file exists so that Netlify can detect the contact form at build time.
      The visible form in the React app posts to the same form name ("contact").
      Do not link to this file; it is purely for the Netlify build bot.
    -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="company" />
      <input type="text" name="projectType" />
      <input type="text" name="budget" />
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
